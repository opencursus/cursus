name: Feature request
description: Propose a new feature or improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please skim the **Nevers** list in
        [DOCUMENTATION/roadmap.md](https://github.com/opencursus/cursus/blob/main/DOCUMENTATION/roadmap.md)
        and the scope rules in
        [CONTRIBUTING.md](https://github.com/opencursus/cursus/blob/main/CONTRIBUTING.md).
        Proposals for AI features, cloud sync, telemetry, calendars, or
        tracking pixels will be closed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not the implementation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work from the user's perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-submission
      options:
        - label: I have read the project's scope rules and Nevers list.
          required: true
        - label: I have searched existing issues and this is not a duplicate.
          required: true
